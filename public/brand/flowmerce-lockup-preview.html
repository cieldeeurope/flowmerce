<!doctype html>
<html lang="ko">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Flowmerce Logo Preview</title>
      <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous" />
      <link
         rel="stylesheet"
         href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
      />
      <style>
         * {
            box-sizing: border-box;
         }

         body {
            margin: 0;
            min-height: 100vh;
            padding: 40px;
            background: #e9edf3;
            font-family:
               "Pretendard Variable",
               "Pretendard",
               system-ui,
               -apple-system,
               BlinkMacSystemFont,
               "Segoe UI",
               sans-serif;
         }

         .frame {
            width: 1800px;
            margin: 0 auto;
            display: grid;
            gap: 28px;
         }

         .artboard {
            height: 360px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 56px 72px;
            overflow: hidden;
         }

         .artboard.light {
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
            border: 1px solid rgba(15, 23, 42, 0.08);
         }

         .artboard.dark {
            background: linear-gradient(180deg, #12151b 0%, #0c0f14 100%);
         }

         .lockup {
            display: flex;
            align-items: center;
            gap: 30px;
         }

         .symbol {
            width: 240px;
            height: 240px;
            object-fit: contain;
            flex: 0 0 auto;
            filter: drop-shadow(0 18px 32px rgba(0, 0, 0, 0.08));
         }

         .dark .symbol {
            filter: drop-shadow(0 20px 40px rgba(255, 255, 255, 0.08));
         }

         .wordmark {
            font-size: 116px;
            line-height: 1;
            font-weight: 800;
            letter-spacing: 0.01em;
            white-space: nowrap;
         }

         .light .wordmark {
            color: #10131a;
         }

         .dark .wordmark {
            color: #f4f7fb;
         }
      </style>
   </head>
   <body>
      <main class="frame">
         <section class="artboard light">
            <div class="lockup">
               <img class="symbol" src="./silver-symbol.png" alt="Flowmerce symbol" />
               <div class="wordmark">FLOWMERCE</div>
            </div>
         </section>

         <section class="artboard dark">
            <div class="lockup">
               <img class="symbol" src="./silver-symbol.png" alt="Flowmerce symbol" />
               <div class="wordmark">FLOWMERCE</div>
            </div>
         </section>
      </main>
   </body>
</html>
